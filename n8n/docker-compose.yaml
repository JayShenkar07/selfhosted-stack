services:
  n8n:
    image: docker.n8n.io/n8nio/n8n
    restart: unless-stopped
    ports:
      - "5678:5678"
    volumes:
      - n8n_data:/home/node/.n8n
    environment:
      # Change this environment variable to secure your n8n instance with basic auth
      - N8N_BASIC_AUTH_ACTIVE=true
      - N8N_BASIC_AUTH_USER=admin
      - N8N_BASIC_AUTH_PASSWORD=admin
      - N8N_SECURE_COOKIE=false
      # Uncomment and configure below if you're connecting to an external database (optional)
      #- DB_TYPE=postgresdb
      #- DB_POSTGRESDB_HOST=your_postgres_host
      #- DB_POSTGRESDB_PORT=5432
      #- DB_POSTGRESDB_DATABASE=n8n
      #- DB_POSTGRESDB_USER=your_user
      #- DB_POSTGRESDB_PASSWORD=your_password
    # Define more environment variables as needed

volumes:
  n8n_data:
    external: true

